---
dnf_packages:
  - btop
  - clamav
  - clamav-update
  - cowsay
  - curl
  - fastfetch
  - fd-find
  - flatpak
  - fortune-mod
  - fzf
  - git
  - gnome-tweaks
  - htop
  - lolcat
  - python3
  - python3-pip
  - python3-virtualenv
  - ripgrep
  - rsync
  - tmux
  - tree
  - vim
  - wget
  - zsh

gnome_extensions_package: gnome-extensions-app
flatpak_packages: []

copy_fonts: true
copy_shell_configs: true
config_files:
  - src: zshrc
    dest: .zshrc
  - src: p10k.zsh
    dest: .p10k.zsh
  - src: bash_profile
    dest: .bash_profile
  - src: tmux.conf
    dest: .tmux.conf
  - src: vimrc
    dest: .vimrc
install_oh_my_zsh: true
install_powerlevel10k: true
set_zsh_as_default_shell: true
configure_git: true
update_flatpak: true
dnf_autoremove: true
dnf_clean: true
