---
packages:
  common:
    - btop
    - clamav
    - cowsay
    - curl
    - fastfetch
    - fd-find
    - flatpak
    - fortune-mod
    - fzf
    - git
    - gnome-tweaks
    - htop
    - lolcat
    - python3
    - python3-pip
    - python3-virtualenv
    - ripgrep
    - rsync
    - syncthing
    - tmux
    - tree
    - vim
    - wget
    - zsh
  fedora:
    - clamav-update
    - firewalld
    - gnome-extensions-app
  ubuntu:
    - clamav-freshclam
    - gnome-shell-extension-manager
    - python3-venv
    - ufw
  docker_fedora:
    - docker-compose
    - moby-engine
  docker_ubuntu:
    - docker-compose-v2
    - docker.io

flatpak_packages:
  - md.obsidian.Obsidian

copy_fonts: true
copy_shell_configs: true
install_vim_plugins: true
set_vim_as_default_editor: true
install_docker: true
config_files:
  - src: zshrc
    dest: .zshrc
  - src: p10k.zsh
    dest: .p10k.zsh
  - src: bash_profile
    dest: .bash_profile
  - src: tmux.conf
    dest: .tmux.conf
  - src: vimrc
    dest: .vimrc
install_oh_my_zsh: true
install_powerlevel10k: true
set_zsh_as_default_shell: true
configure_git: true
update_flatpak: true
package_autoremove: true
package_clean: true
zsh_startup_command: fortune | cowsay -f tux | lolcat -f
